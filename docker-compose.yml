services:
  peregrine:
    build:
      context: .
      dockerfile: ./src/Peregrine.Api/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config/drone.yaml:/app/drone.yaml:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped
